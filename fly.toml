app = "agent-deployment-console"
primary_region = "sin"

[build]

[env]
  DEMO_SEED = "1"
  AGENT_DB_PATH = "/app/data-volume/console.db"

[mounts]
  source = "console_data"
  destination = "/app/data-volume"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
