name: Deploy

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency: deploy-group

# M2 will add an eval job here and gate the deploy on it:
#   deploy.needs: [evals]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - name: Deploy to Fly.io (skips until FLY_API_TOKEN secret is set)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          if [ -z "$FLY_API_TOKEN" ]; then
            echo "FLY_API_TOKEN not configured — skipping deploy."
            exit 0
          fi
          flyctl deploy --remote-only
